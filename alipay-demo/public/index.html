<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付宝支付演示</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; color: #1677ff; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background-color: #1677ff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #0958d9; }
    </style>
</head>
<body>
    <div class="card">
        <h1>支付宝支付演示</h1>
        <form action="/api/pay" method="get">
            <div class="form-group">
                <label for="subject">商品名称</label>
                <input type="text" id="subject" name="subject" value="测试商品" required>
            </div>
            <div class="form-group">
                <label for="total_amount">支付金额 (元)</label>
                <input type="number" id="total_amount" name="total_amount" value="0.01" step="0.01" required>
            </div>
            <button type="submit">去支付</button>
        </form>
    </div>
</body>
</html>
